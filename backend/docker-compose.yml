services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vaktinde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env dosyasinda tanimli olmali}
      POSTGRES_DB: ${POSTGRES_DB:-vaktinde}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaktinde} -d ${POSTGRES_DB:-vaktinde}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Veritabani disariya acilmaz; yalnizca compose agi uzerinden erisilir.

  api:
    build: .
    # Ters vekil bu adla baglanir; klasor adindan turetilen varsayilan
    # (backend-api-1) baska projelerle karisir.
    container_name: vaktinde-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET .env dosyasinda tanimli olmali}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-vaktinde}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vaktinde}
      PHOTO_DIR: /data/photos
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-30}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-180}
      MAX_PHOTOS_PER_USER: ${MAX_PHOTOS_PER_USER:-500}
    volumes:
      - photos:/data/photos
    # Yalnizca localhost'a baglanir; disaridan erisim ters vekil uzerinden
    # olur. Bu yayin yerel dogrulama icindir (curl 127.0.0.1:8000/health).
    # Sunucuda 8000 baska bir servis tarafindan kullaniliyorsa .env icinde
    # API_PORT degistirilir.
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    networks:
      # default: veritabanina erisim. proxy: ters vekilin bu servisi
      # gorebilmesi icin. Veritabani bilincli olarak proxy aginda DEGIL.
      - default
      - proxy

networks:
  proxy:
    # Ters vekil ile ortak ag. Sunucuda zaten var oldugu icin compose
    # olusturmaz, mevcut olana baglanir. Ad, PROXY_NETWORK ile degistirilebilir
    # (bu sunucuda: proxy-network).
    external: true
    name: ${PROXY_NETWORK:-proxy-network}

volumes:
  pgdata:
  photos:
