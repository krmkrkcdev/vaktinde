# Vaktinde API — nginx ters vekil yapılandırması
#
# Kurulum:
#   sudo cp nginx/vaktinde.devposs.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/vaktinde.devposs.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d vaktinde.devposs.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# certbot, aşağıdaki TLS satırlarını kendisi ekler/düzenler.

server {
    listen 80;
    listen [::]:80;
    server_name vaktinde.devposs.com;

    # certbot HTTP-01 doğrulaması dışındaki her şeyi HTTPS'e taşır.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vaktinde.devposs.com;

    # certbot tarafından doldurulur:
    # ssl_certificate     /etc/letsencrypt/live/vaktinde.devposs.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vaktinde.devposs.com/privkey.pem;

    # Fotoğraf yüklemesi için gövde sınırı. API 10 MB'ta kesiyor; buradaki
    # pay multipart başlıkları içindir. Bu satır olmazsa nginx varsayılan
    # 1 MB sınırıyla yüklemeleri 413 ile reddeder.
    client_max_body_size 12M;

    # Mobil bağlantılarda büyük yükleme yavaş olabilir.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Yüklemeyi diske tamponlamadan doğrudan geçir.
        proxy_request_buffering off;
    }
}
